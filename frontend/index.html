<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfoSales</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 600;
    }

    p {
      margin: 0 0 24px;
      color: #555;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    textarea,
    button {
      width: 100%;
      font: inherit;
    }

    input,
    textarea {
      padding: 12px;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      background: #fff;
      color: #111;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #111;
    }

    button {
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      min-height: 20px;
    }

    .error {
      color: #b00020;
    }

    .success {
      color: #0a7a2f;
    }

    .loading {
      color: #555;
    }

    textarea {
      margin-top: 18px;
      min-height: 220px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>InfoSales</h1>
    <p>Upload a sales file and get an AI-generated summary to email.</p>

    <label for="file">Sales file</label>
    <input type="file" id="file" accept=".csv,.xlsx" />

    <label for="email">Recipient email</label>
    <input type="email" id="email" placeholder="name@example.com" />

    <button id="analyzeBtn" onclick="uploadFile()">Analyze</button>

    <div id="statusBox" class="status"></div>

    <label for="result">Summary</label>
    <textarea id="result" placeholder="Your summary will appear here." readonly></textarea>
  </div>

  <script>
    function showStatus(message, type = "") {
      const box = document.getElementById("statusBox");
      box.className = "status " + type;
      box.textContent = message;
    }

    async function uploadFile() {
      const file = document.getElementById("file").files[0];
      const email = document.getElementById("email").value.trim();
      const button = document.getElementById("analyzeBtn");
      const resultBox = document.getElementById("result");

      resultBox.value = "";

      if (!file) {
        showStatus("Please select a file.", "error");
        return;
      }

      if (!email) {
        showStatus("Please enter an email address.", "error");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("email", email);

      try {
        button.disabled = true;
        showStatus("Analyzing...", "loading");

        const response = await fetch("http://localhost:8080/api/analyze", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Request failed.");
        }

        resultBox.value = data.message;
        showStatus("Summary generated and email sent.", "success");
      } catch (error) {
        showStatus(error.message || "Something went wrong.", "error");
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
